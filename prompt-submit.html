  <script>
    document.querySelectorAll("[data-prompt-scene-multiselect]").forEach((group) => {
      const limit = Number(group.getAttribute("data-prompt-scene-limit")) || 3;
      const options = Array.from(group.querySelectorAll("[data-prompt-scene-option]"));
      const counter = group.closest("[data-prompt-submit-field]")?.querySelector("[data-prompt-scene-count]");
      const sync = () => {
        const selected = options.filter((option) => option.checked);
        if (counter) counter.textContent = `${selected.length}/${limit}`;
        options.forEach((option) => {
          option.disabled = !option.checked && selected.length >= limit;
        });
      };
      options.forEach((option) => {
        option.addEventListener("change", () => {
          if (options.filter((item) => item.checked).length > limit) option.checked = false;
          sync();
        });
      });
      sync();
    });
  </script>
