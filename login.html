<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>登录 - 多元拾光</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/duoyuan-shiguang-favicon.svg">
  <link rel="stylesheet" href="./style.css?v=20260722-desktop-only-media-skeleton">
  <link rel="stylesheet" href="./secondary-pages.css?v=20260723-shell-v1">
</head>
<body>
  <div class="page growth-detail-page growth-app-page login-detail-page" data-page="login" style="--growth-hero-image: url('assets/image_assets/7.webp')">
    <div class="page-bg"><img src="assets/image_assets/7.webp" alt=""></div>
    <header class="site-header shared-home-header">
      <div class="header-inner wide-container">
        <a class="logo" href="./index.html" aria-label="多元拾光">
          <img class="brand-logo" src="assets/brand/LOGO.svg" alt="多元拾光 AI原生实践者社区">
        </a>
        <nav class="nav" aria-label="主导航">
          <a href="./index.html"><img class="nav-icon" src="resources/icons/remixicon/svg/Buildings/home-5-line.svg" alt="">首页</a>
          <a href="./aigc.html"><img class="nav-icon" src="resources/icons/remixicon/svg/User &amp; Faces/robot-2-line.svg" alt="">AIGC</a>
          <a href="./model-plaza.html"><img class="nav-icon" src="resources/icons/remixicon/svg/Media/gallery-line.svg" alt="">模型广场</a>
          <a href="./flash.html"><img class="nav-icon" src="resources/icons/remixicon/svg/Others/lightbulb-flash-line.svg" alt="">闪念</a>
          <a href="./tutorial.html"><img class="nav-icon" src="resources/icons/remixicon/svg/Document/book-open-line.svg" alt="">官方教程</a>
        </nav>
        <div class="header-actions">
          <a class="action-link activity-center-link" href="./activity-center.html" data-nav-action="activity-center" data-action-label="活动中心">活动中心</a>
          <a class="action-link" href="./member-store.html" data-nav-action="member">AI商城</a>
          <a class="icon-action notification-link" href="./message-center.html" data-nav-action="messages" data-action-label="消息中心" aria-label="消息中心"><img src="resources/icons/remixicon/svg/Media/notification-3-line.svg" alt=""></a>
          <div class="member-account-pill" role="group" aria-label="积分与用户中心">
            <a class="action-link points-link" href="./points-center.html" data-nav-action="points"><span>积分</span><strong>1280</strong></a>
            <a class="user-avatar-link" href="./user-center.html" data-nav-action="profile" data-action-label="用户头像" aria-label="打开用户菜单"><img src="assets/image_assets/nav-avatar-ai-creator-v1.png" alt="用户头像"></a>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="login-modal-shell section" data-login-section="auth">
        <div class="login-dialog" data-login-modal>
          <div class="login-dialog-head">
            <div>
              <h1>登录</h1>
            </div>
            <a class="modal-close-icon" href="./index.html" aria-label="关闭登录"><img src="resources/icons/remixicon/svg/System/close-line.svg" alt=""></a>
          </div>
          <div class="login-panel" data-login-panel>
            <section class="login-pane phone-login-pane" data-login-mode="phone" aria-label="手机号登录">
              <h2>手机号登录</h2>
              <div class="login-field-stack">
                <label class="login-field">
                  <span>手机号</span>
                  <input type="tel" placeholder="请输入手机号" aria-label="请输入手机号">
                </label>
                <label class="login-field login-code-field">
                  <span>验证码</span>
                  <input type="text" placeholder="请输入验证码" aria-label="请输入验证码">
                  <a href="#login-phone" data-cta-state="send-code">获取验证码</a>
                </label>
                <label class="login-field">
                  <span>邀请码</span>
                  <input type="text" value="SG2026" data-invite-code-field aria-label="邀请码">
                </label>
              </div>
              <a class="button login-submit" href="./user-center.html#invite" data-login-complete-target>继续登录</a>
            </section>

            <section class="login-pane wechat-login-pane" data-login-mode="wechat" aria-label="微信扫码登录">
              <h2>微信扫码登录</h2>
              <div class="login-qr-frame" aria-label="微信扫码">
                <div class="login-qr-grid">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                </div>
                <img src="resources/icons/remixicon/svg/Logos/wechat-line.svg" alt="">
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>


<div class="footer-space"></div>
  </div>
  <script src="./walkthrough.js?v=20260721-no-walkthrough-media-skeleton" defer></script>
</body>
</html>
